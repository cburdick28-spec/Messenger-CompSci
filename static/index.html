<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <link rel="icon" href="/static/logo.svg" type="image/svg+xml" />
    <title>Messenger Chat</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
      .wrap { display: none; height: 100vh; }
      .login { display: grid; place-items: center; height: 100vh; }
      .card { width: min(460px, 92vw); background: #1e293b; padding: 20px; border-radius: 12px; }
      .app { display: flex; width: 100%; height: 100%; }
      .sidebar { width: 340px; border-right: 1px solid #334155; padding: 14px; overflow-y: auto; background: #111827; }
      .chat { flex: 1; display: flex; flex-direction: column; }
      .chat-head { border-bottom: 1px solid #334155; padding: 14px; font-weight: bold; }
      .messages { flex: 1; overflow-y: auto; padding: 14px; }
      .row { display: flex; gap: 8px; padding: 8px 14px 14px; border-top: 1px solid #334155; }
      input, button { border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; padding: 10px; }
      input { width: 100%; }
      button { cursor: pointer; background: #2563eb; border-color: #2563eb; }
      select { border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; padding: 10px; width: 100%; }
      .item { padding: 8px; border: 1px solid #334155; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 8px; align-items: center; }
      .actions { display: flex; gap: 6px; }
      .actions button { padding: 6px 8px; }
      .muted { color: #94a3b8; font-size: 12px; }
      .msg { margin-bottom: 10px; background: #1e293b; border: 1px solid #334155; padding: 8px; border-radius: 8px; }
      h3 { margin: 14px 0 8px; }
      .me { color: #86efac; }
      #error { color: #fca5a5; min-height: 20px; }
      .hidden { display: none; }
      .quick-chat { display: flex; flex-direction: column; gap: 8px; width: 100%; }
      .emoji-bar { display: flex; gap: 6px; flex-wrap: wrap; }
      .emoji-btn { padding: 6px 10px; font-size: 18px; line-height: 1; background: #1d4ed8; border-color: #1d4ed8; }
      .admin-panel { border: 1px solid #334155; border-radius: 8px; padding: 10px; margin-top: 8px; }
      .admin-log { max-height: 180px; overflow-y: auto; border: 1px solid #334155; border-radius: 8px; padding: 8px; background: #0b1220; }
      .admin-log-item { margin-bottom: 8px; border-bottom: 1px solid #1f2937; padding-bottom: 6px; }
      .admin-log-item:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
      .admin-inline { display: flex; gap: 6px; margin-bottom: 8px; }
      .admin-inline input { max-width: 140px; }
    </style>
  </head>
  <body>
    <div class="login" id="login">
      <div class="card">
        <h2>Messenger Chat</h2>
        <p class="muted">Vercel + Supabase mode.</p>
        <input id="emailInput" placeholder="Email address" />
        <div style="height:8px"></div>
        <input id="passwordInput" type="password" placeholder="Password (login only)" />
        <div style="height:10px"></div>
        <div style="display:flex; gap:8px;">
          <button id="registerBtn" onclick="document.getElementById('error').textContent='Working...'; if (window.__messengerAuth) { window.__messengerAuth('register'); } else { document.getElementById('error').textContent=(window.__messengerInitError || 'App failed to initialize. Reload with ?v=8'); }">Register</button>
          <button id="loginBtn" onclick="document.getElementById('error').textContent='Working...'; if (window.__messengerAuth) { window.__messengerAuth('login'); } else { document.getElementById('error').textContent=(window.__messengerInitError || 'App failed to initialize. Reload with ?v=8'); }">Login</button>
        </div>
        <div style="height:8px"></div>
        <button id="installBtn" class="hidden" style="width:100%;">Install App</button>
        <p id="error"></p>
      </div>
    </div>

    <div class="wrap" id="wrap">
      <div class="app">
        <aside class="sidebar">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
            <b id="meLabel"></b>
            <button id="logoutBtn">Logout</button>
          </div>

          <h3>Contacts</h3>
          <div style="display:flex; gap:6px; margin-bottom:8px;">
            <input id="contactInput" placeholder="friend@email.com" />
            <button id="addContactBtn">Add</button>
          </div>
          <div id="contactsList"></div>

          <h3>Groups</h3>
          <div style="display:flex; gap:6px; margin-bottom:8px;">
            <input id="groupInput" placeholder="New group name" />
            <button id="createGroupBtn">Create</button>
          </div>
          <div id="groupsList"></div>

          <h3 id="adminHeading" class="hidden">Admin Panel</h3>
          <button id="claimAdminBtn" class="hidden" style="width:100%; margin-bottom:8px;">Claim Admin Access</button>
          <div id="adminPanel" class="admin-panel hidden">
            <div class="admin-inline">
              <select id="adminUserSelect"></select>
            </div>
            <div class="admin-inline">
              <input id="timeoutMinutesInput" type="number" min="1" value="10" />
              <button id="timeoutBtn">Timeout</button>
            </div>
            <div class="admin-inline">
              <button id="banBtn">Ban</button>
              <button id="unbanBtn">Clear</button>
            </div>
            <div id="adminModerationStatus" class="muted"></div>
            <div style="height:8px"></div>
            <div class="muted">Recent messages</div>
            <div id="adminMessageLog" class="admin-log"></div>
          </div>
        </aside>

        <section class="chat">
          <div class="chat-head" id="chatTitle">Select a contact or group</div>
          <div class="messages" id="messages"></div>
          <div class="row">
            <div class="quick-chat">
              <div id="emojiBar" class="emoji-bar"></div>
              <select id="quickMessageSelect"></select>
              <input id="customMessageInput" class="hidden" placeholder="Admin: type any message..." />
            </div>
            <button id="sendBtn">Send</button>
            <button id="sendCustomBtn" class="hidden">Send Typed</button>
          </div>
        </section>
      </div>
    </div>

    <script>
      window.__messengerInitError = "";
      window.addEventListener("error", function (event) {
        var msg = event && event.message ? event.message : "Unknown script error";
        window.__messengerInitError = "Init error: " + msg;
        var errEl = document.getElementById("error");
        if (errEl && !window.__messengerAuth) {
          errEl.textContent = window.__messengerInitError;
        }
      });
    </script>
    <script src="/static/supabase-js.js"></script>
    <script src="/static/config.js"></script>
    <script>
      let sbClient = null;
      let me = null;
      let contacts = [];
      let groups = [];
      let current = null;
      let installPrompt = null;
      let refreshTimer = null;
      let isAdmin = false;
      let hasAdmin = false;
      let myModeration = null;
      let allProfiles = [];
      let moderationMap = new Map();
      const byConversation = new Map();

      const el = (id) => document.getElementById(id);
      const contactsList = el("contactsList");
      const groupsList = el("groupsList");
      const messages = el("messages");
      const chatTitle = el("chatTitle");
      const error = el("error");
      const adminHeading = el("adminHeading");
      const claimAdminBtn = el("claimAdminBtn");
      const adminPanel = el("adminPanel");
      const adminUserSelect = el("adminUserSelect");
      const timeoutMinutesInput = el("timeoutMinutesInput");
      const timeoutBtn = el("timeoutBtn");
      const banBtn = el("banBtn");
      const unbanBtn = el("unbanBtn");
      const adminModerationStatus = el("adminModerationStatus");
      const adminMessageLog = el("adminMessageLog");
      const customMessageInput = el("customMessageInput");
      const sendCustomBtn = el("sendCustomBtn");
      const QUICK_MESSAGES = [
        "Hey, what's up?",
        "On my way.",
        "Running a few minutes late.",
        "Can we talk later?",
        "I'm here.",
        "Sounds good to me.",
        "Thanks, I appreciate it.",
        "No worries.",
        "Let me check and get back to you.",
        "Talk soon."
      ];
      const QUICK_EMOJIS = ["😀", "😂", "😎", "🔥", "👍", "👀", "🎉", "❤️", "🙌", "😅"];
      const ALLOWED_MESSAGES = new Set([...QUICK_MESSAGES, ...QUICK_EMOJIS]);

      window.addEventListener("error", (event) => {
        setError(`Script error: ${event.message}`);
      });

      function dmPair(idA, idB) { return [idA, idB].sort(); }
      function dmId(a, b) { return `dm:${[a, b].sort().join(":")}`; }
      function groupId(id) { return `group:${id}`; }
      function esc(text) { return String(text).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;"); }

      function setError(message) {
        error.textContent = message || "";
      }

      function registrationFunctionUrl() {
        const base = String(window.MESSENGER_CONFIG.supabaseUrl || "").replace(/\/+$/, "");
        return `${base}/functions/v1/request-registration`;
      }

      function setLoggedIn(loggedIn) {
        el("login").style.display = loggedIn ? "none" : "grid";
        el("wrap").style.display = loggedIn ? "block" : "none";
      }

      function toBool(value) {
        if (value === true || value === false) return value;
        if (typeof value === "string") return value.toLowerCase() === "true";
        if (value && typeof value === "object" && "app_is_admin" in value) return Boolean(value.app_is_admin);
        if (value && typeof value === "object" && "app_has_admin" in value) return Boolean(value.app_has_admin);
        return Boolean(value);
      }

      function isMissingSchemaError(err) {
        const text = String((err && err.message) || "").toLowerCase();
        return text.includes("does not exist") || text.includes("could not find");
      }

      function restrictionMessage() {
        if (!myModeration) return "";
        if (myModeration.is_banned) return "Your account is banned from sending messages.";
        if (myModeration.timeout_until) {
          const until = new Date(myModeration.timeout_until);
          if (!Number.isNaN(until.getTime()) && until.getTime() > Date.now()) {
            return `You are timed out until ${until.toLocaleString()}.`;
          }
        }
        return "";
      }

      function renderAdminUserOptions() {
        if (!isAdmin) return;
        const options = allProfiles
          .filter((p) => p.id !== me.id)
          .map((p) => {
            const mod = moderationMap.get(p.id);
            let badge = "";
            if (mod && mod.is_banned) badge = " [BANNED]";
            else if (mod && mod.timeout_until && new Date(mod.timeout_until).getTime() > Date.now()) badge = " [TIMED OUT]";
            return `<option value="${encodeURIComponent(p.id)}">${esc(p.email)}${esc(badge)}</option>`;
          });
        adminUserSelect.innerHTML = options.join("") || `<option value="">No other users</option>`;
      }

      function renderAdminControls() {
        const showClaim = !hasAdmin;
        claimAdminBtn.classList.toggle("hidden", !showClaim || !me);
        const showPanel = isAdmin;
        adminHeading.classList.toggle("hidden", !showPanel);
        adminPanel.classList.toggle("hidden", !showPanel);
        customMessageInput.classList.toggle("hidden", !showPanel);
        sendCustomBtn.classList.toggle("hidden", !showPanel);
      }

      async function fetchAdminState() {
        try {
          const { data: hasData, error: hasError } = await sbClient.rpc("app_has_admin");
          if (hasError) throw hasError;
          const { data: adminData, error: adminError } = await sbClient.rpc("app_is_admin");
          if (adminError) throw adminError;
          hasAdmin = toBool(hasData);
          isAdmin = toBool(adminData);
        } catch (adminError) {
          hasAdmin = true;
          isAdmin = false;
          if (!isMissingSchemaError(adminError)) throw adminError;
        }
        renderAdminControls();
      }

      async function loadMyModeration() {
        try {
          const { data, error: moderationError } = await sbClient
            .from("user_moderation")
            .select("is_banned,timeout_until")
            .eq("user_id", me.id)
            .maybeSingle();
          if (moderationError) throw moderationError;
          myModeration = data || null;
        } catch (moderationError) {
          myModeration = null;
          if (!isMissingSchemaError(moderationError)) throw moderationError;
        }
      }

      async function loadAdminProfiles() {
        if (!isAdmin) return;
        const { data, error: profilesError } = await sbClient
          .from("profiles")
          .select("id,email")
          .order("email", { ascending: true });
        if (profilesError) throw profilesError;
        allProfiles = data || [];
        renderAdminUserOptions();
      }

      async function loadModerationMap() {
        if (!isAdmin) return;
        const { data, error: moderationError } = await sbClient
          .from("user_moderation")
          .select("user_id,is_banned,timeout_until");
        if (moderationError) throw moderationError;
        moderationMap = new Map((data || []).map((row) => [row.user_id, row]));
        renderAdminUserOptions();
      }

      async function loadAdminMessageLog() {
        if (!isAdmin) return;
        const { data: rows, error: messagesError } = await sbClient
          .from("messages")
          .select("id,kind,dm_a,dm_b,group_id,sender_id,text,created_at")
          .order("created_at", { ascending: false })
          .limit(120);
        if (messagesError) throw messagesError;

        const userIds = [...new Set((rows || []).flatMap((m) => [m.sender_id, m.dm_a, m.dm_b]).filter(Boolean))];
        const groupIds = [...new Set((rows || []).map((m) => m.group_id).filter(Boolean))];

        const [profileResult, groupsResult] = await Promise.all([
          userIds.length
            ? sbClient.from("profiles").select("id,email").in("id", userIds)
            : Promise.resolve({ data: [], error: null }),
          groupIds.length
            ? sbClient.from("chat_groups").select("id,name").in("id", groupIds)
            : Promise.resolve({ data: [], error: null })
        ]);

        if (profileResult.error) throw profileResult.error;
        if (groupsResult.error) throw groupsResult.error;

        const emailById = new Map((profileResult.data || []).map((p) => [p.id, p.email]));
        const nameByGroupId = new Map((groupsResult.data || []).map((g) => [g.id, g.name]));

        adminMessageLog.innerHTML = (rows || []).map((m) => {
          const sender = emailById.get(m.sender_id) || "Unknown";
          let target = "Unknown";
          if (m.kind === "group") {
            target = `#${nameByGroupId.get(m.group_id) || "group"}`;
          } else {
            const otherId = m.sender_id === m.dm_a ? m.dm_b : m.dm_a;
            target = emailById.get(otherId) || "Unknown";
          }
          return `<div class="admin-log-item"><div class="muted">${new Date(m.created_at).toLocaleString()}</div><b>${esc(sender)}</b> → ${esc(target)}: ${esc(m.text)}</div>`;
        }).join("") || `<div class="muted">No messages yet.</div>`;
      }

      function selectedAdminUserId() {
        const raw = adminUserSelect.value;
        return raw ? decodeURIComponent(raw) : "";
      }

      async function applyModeration(action) {
        if (!isAdmin) return setError("Admin access required.");
        const userId = selectedAdminUserId();
        if (!userId) return setError("Select a user first.");

        let payload;
        if (action === "ban") {
          payload = { user_id: userId, is_banned: true, timeout_until: null, updated_by: me.id, updated_at: new Date().toISOString() };
        } else if (action === "clear") {
          payload = { user_id: userId, is_banned: false, timeout_until: null, updated_by: me.id, updated_at: new Date().toISOString() };
        } else {
          const minutes = Number(timeoutMinutesInput.value || "0");
          if (!Number.isFinite(minutes) || minutes < 1) return setError("Timeout must be at least 1 minute.");
          const timeoutUntil = new Date(Date.now() + minutes * 60 * 1000).toISOString();
          payload = { user_id: userId, is_banned: false, timeout_until: timeoutUntil, updated_by: me.id, updated_at: new Date().toISOString() };
        }

        const { error: upsertError } = await sbClient
          .from("user_moderation")
          .upsert(payload, { onConflict: "user_id" });
        if (upsertError) return setError(upsertError.message);
        adminModerationStatus.textContent = "Moderation updated.";
        await loadModerationMap();
      }

      async function sendMessageText(text) {
        if (!current) return setError("Select a contact or group first.");
        const cleanText = String(text || "").trim();
        if (!cleanText) return;
        if (!isAdmin && !ALLOWED_MESSAGES.has(cleanText)) {
          return setError("Only admin can send typed messages.");
        }

        const blocked = restrictionMessage();
        if (blocked) return setError(blocked);

        let payload;
        if (current.kind === "dm") {
          const [a, b] = dmPair(me.id, current.userId);
          payload = { kind: "dm", dm_a: a, dm_b: b, sender_id: me.id, text: cleanText };
        } else {
          payload = { kind: "group", group_id: current.group.id, sender_id: me.id, text: cleanText };
        }
        const { error: insertError } = await sbClient.from("messages").insert(payload);
        if (insertError) return setError(insertError.message);
        setError("");
        customMessageInput.value = "";
        await refreshCurrentHistory();
      }

      function initQuickChatOptions() {
        const select = el("quickMessageSelect");
        const emojiBar = el("emojiBar");
        select.innerHTML = `<option value="">Choose a quick message...</option>${QUICK_MESSAGES.map((m) => `<option value="${esc(m)}">${esc(m)}</option>`).join("")}`;
        emojiBar.innerHTML = QUICK_EMOJIS.map((emoji) => `<button class="emoji-btn" type="button" onclick="sendQuickMessage('${emoji}')">${emoji}</button>`).join("");
      }

      async function ensureProfile(user) {
        const email = (user.email || "").toLowerCase();
        await sbClient.from("profiles").upsert({ id: user.id, email }, { onConflict: "id" });
      }

      async function loadContacts() {
        const { data: rows, error: contactsError } = await sbClient
          .from("contacts")
          .select("contact_id")
          .eq("owner_id", me.id);
        if (contactsError) throw contactsError;

        if (!rows.length) {
          contacts = [];
          renderContacts();
          return;
        }

        const contactIds = rows.map((r) => r.contact_id);
        const { data: profiles, error: profilesError } = await sbClient
          .from("profiles")
          .select("id,email")
          .in("id", contactIds);
        if (profilesError) throw profilesError;

        const byId = new Map((profiles || []).map((p) => [p.id, p]));
        contacts = rows
          .map((row) => byId.get(row.contact_id))
          .filter(Boolean)
          .map((p) => ({ id: p.id, email: p.email }))
          .sort((a, b) => a.email.localeCompare(b.email));
        renderContacts();
      }

      async function loadGroups() {
        const { data: memberships, error: membersError } = await sbClient
          .from("group_members")
          .select("group_id")
          .eq("user_id", me.id);
        if (membersError) throw membersError;

        if (!memberships.length) {
          groups = [];
          renderGroups();
          return;
        }

        const groupIds = memberships.map((m) => m.group_id);
        const { data: groupRows, error: groupsError } = await sbClient
          .from("chat_groups")
          .select("id,name")
          .in("id", groupIds)
          .order("name", { ascending: true });
        if (groupsError) throw groupsError;

        groups = groupRows || [];
        renderGroups();
      }

      async function loadDmHistory(otherUserId, otherEmail) {
        const [a, b] = dmPair(me.id, otherUserId);
        const { data, error: historyError } = await sbClient
          .from("messages")
          .select("id,kind,dm_a,dm_b,group_id,sender_id,text,created_at")
          .eq("kind", "dm")
          .eq("dm_a", a)
          .eq("dm_b", b)
          .order("created_at", { ascending: true })
          .limit(500);
        if (historyError) throw historyError;

        byConversation.set(
          dmId(me.email, otherEmail),
          (data || []).map((m) => ({
            conversationId: dmId(me.email, otherEmail),
            from: m.sender_id === me.id ? me.email : otherEmail,
            text: m.text,
            timestamp: m.created_at
          }))
        );
      }

      async function loadGroupHistory(group) {
        const { data, error: historyError } = await sbClient
          .from("messages")
          .select("id,kind,group_id,sender_id,text,created_at")
          .eq("kind", "group")
          .eq("group_id", group.id)
          .order("created_at", { ascending: true })
          .limit(500);
        if (historyError) throw historyError;

        const senderIds = [...new Set((data || []).map((m) => m.sender_id))];
        const senderEmails = {};
        if (senderIds.length) {
          const { data: profiles } = await sbClient.from("profiles").select("id,email").in("id", senderIds);
          (profiles || []).forEach((p) => { senderEmails[p.id] = p.email; });
        }

        byConversation.set(
          groupId(group.id),
          (data || []).map((m) => ({
            conversationId: groupId(group.id),
            from: senderEmails[m.sender_id] || "Unknown",
            text: m.text,
            timestamp: m.created_at
          }))
        );
      }

      function renderContacts() {
        contactsList.innerHTML = contacts.map((c) => `
          <div class="item">
            <span>${esc(c.email)}</span>
            <div class="actions"><button onclick="openDm('${encodeURIComponent(c.id)}','${encodeURIComponent(c.email)}')">Chat</button></div>
          </div>`).join("") || `<div class="muted">No contacts yet.</div>`;
      }

      function renderGroups() {
        groupsList.innerHTML = groups.map((g) => `
          <div class="item">
            <div>${esc(g.name)}</div>
            <div class="actions"><button onclick="openGroup('${encodeURIComponent(g.id)}','${encodeURIComponent(g.name)}')">Open</button></div>
          </div>`).join("") || `<div class="muted">No groups yet.</div>`;
      }

      function renderMessages(conversationId) {
        const list = byConversation.get(conversationId) || [];
        messages.innerHTML = list.map((m) => {
          const who = m.from === me.email ? `<span class="me">${esc(m.from)}</span>` : esc(m.from);
          return `<div class="msg"><b>${who}</b>: ${esc(m.text)}<div class="muted">${new Date(m.timestamp).toLocaleString()}</div></div>`;
        }).join("");
        messages.scrollTop = messages.scrollHeight;
      }

      async function refreshCurrentHistory() {
        if (!current) return;
        if (current.kind === "dm") {
          await loadDmHistory(current.userId, current.email);
        } else {
          await loadGroupHistory(current.group);
        }
        renderMessages(current.id);
      }

      async function startSession(user) {
        me = { id: user.id, email: user.email.toLowerCase() };
        await ensureProfile(user);
        await fetchAdminState();
        await loadMyModeration();
        el("meLabel").textContent = `You: ${me.email}`;
        await loadContacts();
        await loadGroups();
        if (isAdmin) {
          await loadAdminProfiles();
          await loadModerationMap();
          await loadAdminMessageLog();
        } else {
          adminMessageLog.innerHTML = "";
          adminModerationStatus.textContent = "";
        }
        setLoggedIn(true);
        setError(restrictionMessage());
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(async () => {
          try {
            await fetchAdminState();
            await loadMyModeration();
            await loadContacts();
            await loadGroups();
            await refreshCurrentHistory();
            if (isAdmin) {
              await loadAdminProfiles();
              await loadModerationMap();
              await loadAdminMessageLog();
            }
          } catch (refreshError) {
            // Keep UI responsive if background refresh fails intermittently.
          }
        }, 3000);
      }

      async function auth(action) {
        try {
          const email = el("emailInput").value.trim().toLowerCase();
          const password = el("passwordInput").value.trim();
          if (!email) return setError("Enter your email address.");
          if (!email.includes("@")) return setError("Enter a valid email address.");
          if (action === "login") {
            if (!password) return setError("Enter your password to log in.");
            if (password.length < 6) return setError("Password must be at least 6 characters.");
          }
          setError("Working...");

          const withTimeout = (promise, ms = 12000) =>
            Promise.race([
              promise,
              new Promise((_, reject) =>
                setTimeout(() => reject(new Error("Request timed out. School network may be blocking Supabase.")), ms)
              )
            ]);

          if (action === "register") {
            const response = await withTimeout(
              fetch(registrationFunctionUrl(), {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "apikey": window.MESSENGER_CONFIG.supabaseAnonKey,
                  "Authorization": `Bearer ${window.MESSENGER_CONFIG.supabaseAnonKey}`
                },
                body: JSON.stringify({ email })
              })
            );
            let payload = {};
            try {
              payload = await response.json();
            } catch (_parseError) {
              payload = {};
            }
            if (!response.ok) {
              return setError(payload.error || "Could not submit registration request.");
            }
            return setError(
              payload.message ||
              "Request sent. cburdick28@brewstermadrid.com must approve it first. After approval, check your email invite to set your password."
            );
          }

          const result = await withTimeout(sbClient.auth.signInWithPassword({ email, password }));
          if (result.error) return setError(result.error.message);
          if (!result.data.user) return setError("Could not authenticate. Try again.");

          await startSession(result.data.user);
        } catch (authError) {
          const authErrorMessage = authError && authError.message ? authError.message : "Authentication failed.";
          setError(authErrorMessage);
        }
      }

      window.__messengerAuth = auth;

      window.openDm = async (encodedUserId, encodedEmail) => {
        const userId = decodeURIComponent(encodedUserId);
        const email = decodeURIComponent(encodedEmail);
        current = { kind: "dm", userId, email, id: dmId(me.email, email) };
        chatTitle.textContent = `Direct chat with ${email}`;
        await loadDmHistory(userId, email);
        renderMessages(current.id);
      };

      window.openGroup = async (encodedGroupId, encodedName) => {
        const id = decodeURIComponent(encodedGroupId);
        const name = decodeURIComponent(encodedName);
        const group = { id, name };
        current = { kind: "group", group, id: groupId(id) };
        chatTitle.textContent = `Group: ${name}`;
        await loadGroupHistory(group);
        renderMessages(current.id);
      };

      el("registerBtn").onclick = () => auth("register");
      el("loginBtn").onclick = () => auth("login");

      el("addContactBtn").onclick = async () => {
        const contactEmail = el("contactInput").value.trim().toLowerCase();
        if (!contactEmail) return;
        const { data: profile, error: profileError } = await sbClient
          .from("profiles")
          .select("id,email")
          .eq("email", contactEmail)
          .single();
        if (profileError || !profile) return setError("No account found for that email.");
        if (profile.id === me.id) return setError("You cannot add yourself.");
        const { error: insertError } = await sbClient.from("contacts").upsert(
          { owner_id: me.id, contact_id: profile.id },
          { onConflict: "owner_id,contact_id" }
        );
        if (insertError) return setError(insertError.message);
        el("contactInput").value = "";
        await loadContacts();
      };

      el("createGroupBtn").onclick = async () => {
        const name = el("groupInput").value.trim();
        if (!name) return;
        const { data: created, error: groupError } = await sbClient
          .from("chat_groups")
          .insert({ name, created_by: me.id })
          .select("id,name")
          .single();
        if (groupError) return setError(groupError.message);

        const { error: memberError } = await sbClient
          .from("group_members")
          .upsert({ group_id: created.id, user_id: me.id }, { onConflict: "group_id,user_id" });
        if (memberError) return setError(memberError.message);
        el("groupInput").value = "";
        await loadGroups();
      };

      window.sendQuickMessage = async (text) => {
        await sendMessageText(text);
      };

      el("sendBtn").onclick = async () => {
        const selected = el("quickMessageSelect").value;
        if (!selected) return setError("Choose a quick message first.");
        await sendMessageText(selected);
      };

      sendCustomBtn.onclick = async () => {
        await sendMessageText(customMessageInput.value);
      };

      claimAdminBtn.onclick = async () => {
        if (!me) return;
        const payload = { email: me.email, created_by: me.id };
        const { error: insertError } = await sbClient.from("admin_users").insert(payload);
        if (insertError) return setError(insertError.message);
        await fetchAdminState();
        if (isAdmin) {
          await loadAdminProfiles();
          await loadModerationMap();
          await loadAdminMessageLog();
          setError("");
        }
      };

      timeoutBtn.onclick = async () => { await applyModeration("timeout"); };
      banBtn.onclick = async () => { await applyModeration("ban"); };
      unbanBtn.onclick = async () => { await applyModeration("clear"); };

      el("logoutBtn").onclick = async () => {
        await sbClient.auth.signOut();
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = null;
        me = null;
        isAdmin = false;
        hasAdmin = false;
        myModeration = null;
        allProfiles = [];
        moderationMap = new Map();
        current = null;
        contacts = [];
        groups = [];
        byConversation.clear();
        messages.innerHTML = "";
        adminMessageLog.innerHTML = "";
        adminModerationStatus.textContent = "";
        customMessageInput.value = "";
        renderAdminControls();
        chatTitle.textContent = "Select a contact or group";
        setLoggedIn(false);
      };

      el("quickMessageSelect").addEventListener("keydown", (e) => { if (e.key === "Enter") el("sendBtn").click(); });
      customMessageInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendCustomBtn.click(); });
      el("passwordInput").addEventListener("keydown", (e) => { if (e.key === "Enter") auth("login"); });

      if ("serviceWorker" in navigator) navigator.serviceWorker.register("/static/service-worker.js?v=2");

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        installPrompt = event;
        el("installBtn").classList.remove("hidden");
      });

      el("installBtn").onclick = async () => {
        if (!installPrompt) return;
        installPrompt.prompt();
        await installPrompt.userChoice;
        installPrompt = null;
        el("installBtn").classList.add("hidden");
      };

      async function bootstrap() {
        renderAdminControls();
        if (!window.MESSENGER_CONFIG || !window.MESSENGER_CONFIG.supabaseUrl || !window.MESSENGER_CONFIG.supabaseAnonKey) {
          setError("Missing Supabase config. Edit /static/config.js with your project URL and anon key.");
          return;
        }
        initQuickChatOptions();
        sbClient = window.supabase.createClient(
          window.MESSENGER_CONFIG.supabaseUrl,
          window.MESSENGER_CONFIG.supabaseAnonKey
        );

        const { data } = await sbClient.auth.getUser();
        if (data && data.user) await startSession(data.user);
      }

      bootstrap();
    </script>
  </body>
</html>
